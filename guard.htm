<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guard Dashboard</title>
  <link rel="stylesheet" href="guard.css">
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">SecureGate</p>
        <h1>Guard Dashboard</h1>
        <p class="subtext">Only guard work is shown on this page.</p>
      </div>
      <a class="back-link" href="front.htm">Back to Login</a>
    </header>

    <section class="steps-grid">
      <article class="step-card">
        <span class="step-number">1</span>
        <h2>Take visitor photo</h2>
        <div class="camera-box">
          <video id="guardVideo" class="camera-view hidden" autoplay playsinline muted></video>
          <img id="guardPhotoPreview" class="photo-preview hidden" alt="Visitor preview">
          <canvas id="guardCanvas" class="hidden"></canvas>
        </div>
        <button class="primary-button" id="guardPhotoButton" type="button">Open Camera</button>
        <p class="status-text" id="guardPhotoStatus">Photo not taken.</p>
      </article>

      <article class="step-card">
        <span class="step-number">2</span>
        <h2>Enter visitor name</h2>
        <input id="guardVisitorInput" type="text" value="Meena Delivery" aria-label="Visitor name">
      </article>

      <article class="step-card">
        <span class="step-number">3</span>
        <h2>Send request to flat owner</h2>
        <input id="guardFlatInput" type="text" value="B-504" aria-label="Flat number">
        <button class="primary-button" id="guardSendButton" type="button">Send Request</button>
        <p class="status-text" id="guardStatus">Visitor can enter only after flat owner approval.</p>
      </article>
    </section>

    <section class="status-card">
      <p class="eyebrow">Request Status</p>
      <div class="status-box" id="guardRequestList">
        <div class="list-item">No request sent yet.</div>
      </div>
    </section>
  </main>

  <script src="shared-store.js"></script>
  <script src="guard.js"></script>
</body>
</html>
